name: CICD

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - '.github/instructions/**'
      - '.github/plans/**'
      - '.github/prompts/**'
      - '.github/agents/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - '.github/instructions/**'
      - '.github/plans/**'
      - '.github/prompts/**'
      - '.github/agents/**'

permissions:
  contents: read
  actions: read
  pull-requests: read

defaults:
  run:
    shell: powershell

jobs:
  Initialization:
    runs-on: [ windows-latest ]
    outputs:
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v9.0
        with:
          shell: powershell

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v9.0
        with:
          shell: powershell

  Build:
    needs: [ Initialization ]
    runs-on: [ windows-latest ]
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v9.0
        with:
          shell: powershell
          project: '.'

      - name: Run pipeline
        uses: microsoft/AL-Go-Actions/RunPipeline@v9.0
        with:
          shell: powershell
          project: '.'

      - name: Calculate Artifact names
        id: calculateArtifactNames
        if: success() || failure()
        run: |
          $appVersion = '${{ github.run_number }}'
          $AppsArtifactsName = "${{ github.repository }}-Apps-$appVersion".Replace('/', '_')
          Write-Host "AppsArtifactsName=$AppsArtifactsName" >> $env:GITHUB_OUTPUT
          $TestAppsArtifactsName = "${{ github.repository }}-TestApps-$appVersion".Replace('/', '_')
          Write-Host "TestAppsArtifactsName=$TestAppsArtifactsName" >> $env:GITHUB_OUTPUT

      - name: Publish artifacts - apps
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: ${{ steps.calculateArtifactNames.outputs.AppsArtifactsName }}
          path: './.buildartifacts/Apps/'
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish artifacts - test apps
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: ${{ steps.calculateArtifactNames.outputs.TestAppsArtifactsName }}
          path: './.buildartifacts/TestApps/'
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup
        if: always()
        uses: microsoft/AL-Go-Actions/PipelineCleanup@v9.0
        with:
          shell: powershell

  PostProcess:
    if: always()
    runs-on: [ windows-latest ]
    needs: [ Initialization, Build ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Finalize the workflow
        id: PostProcess
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v9.0
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.Initialization.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}
