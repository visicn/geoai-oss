name: Create release

on:
  workflow_dispatch:
    inputs:
      appVersion:
        description: App version to promote to release (default is latest)
        required: false
        default: 'latest'
      name:
        description: Name of this release
        required: true
        default: ''
      tag:
        description: Tag of this release (Defaults to app version)
        required: false
        default: ''
      prerelease:
        description: Prerelease (Y/N)
        required: false
        default: 'N'
      draft:
        description: Draft (Y/N)
        required: false
        default: 'N'
      createReleaseBranch:
        description: Create Release Branch (Y/N)
        required: false
        default: 'N'
      releaseBranchPrefix:
        description: The prefix for the release branch. Used only if Create Release Branch is set to Y.
        required: false
        default: 'release/'
      directCommit:
        description: Direct Commit (Y/N)
        required: false
        default: 'N'

permissions:
  contents: write
  pull-requests: write
  actions: read

defaults:
  run:
    shell: powershell

jobs:
  CreateRelease:
    runs-on: [ windows-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@main
        with:
          shell: powershell
          eventId: "DO0094"

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@main
        with:
          shell: powershell

      - name: Read secrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@main
        env:
          secrets: ${{ toJson(secrets) }}
        with:
          shell: powershell
          settingsJson: ${{ env.Settings }}

      - name: Create release
        uses: microsoft/AL-Go-Actions/CreateRelease@main
        with:
          shell: powershell
          token: ${{ secrets.GITHUB_TOKEN }}
          parentTelemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
          settingsJson: ${{ env.Settings }}
          secretsJson: ${{ env.RepoSecrets }}
          appVersion: ${{ github.event.inputs.appVersion }}
          name: ${{ github.event.inputs.name }}
          tag: ${{ github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          draft: ${{ github.event.inputs.draft }}
          createReleaseBranch: ${{ github.event.inputs.createReleaseBranch }}
          releaseBranchPrefix: ${{ github.event.inputs.releaseBranchPrefix }}
          directCommit: ${{ github.event.inputs.directCommit }}

      - name: Finalize the workflow
        if: always()
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@main
        with:
          shell: powershell
          eventId: "DO0094"
          telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
