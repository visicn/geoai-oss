name: Build and Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    name: Build GeoAI OSS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install BcContainerHelper
      shell: powershell
      run: |
        Install-Module BcContainerHelper -Force -AllowClobber
        Import-Module BcContainerHelper
        Write-Host "BcContainerHelper $(Get-Module BcContainerHelper | Select-Object -ExpandProperty Version) installed"

    - name: Compile AL extension
      shell: powershell
      run: |
        Import-Module BcContainerHelper

        $appJson = Get-Content -Path "app.json" -Raw | ConvertFrom-Json
        $appVersion = $appJson.application
        Write-Host "App requires BC application version: $appVersion"

        # Resolve the matching BC artifact for compilation
        $artifactUrl = Get-BCArtifactUrl `
          -type OnPrem `
          -country w1 `
          -version $appVersion `
          -select Latest
        Write-Host "Using artifact: $artifactUrl"

        # Download symbols (System + Base app)
        $symbolsPath = Join-Path $env:GITHUB_WORKSPACE ".alpackages"
        New-Item -ItemType Directory -Path $symbolsPath -Force | Out-Null

        Download-Artifacts -artifactUrl $artifactUrl -basePath (Join-Path $env:RUNNER_TEMP "bcartifacts")
        $artifactPaths = Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "bcartifacts") -Recurse -Directory

        # Locate the AL compiler (alc.exe)
        $alcPath = Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "bcartifacts") `
          -Filter "alc.exe" -Recurse | Select-Object -First 1

        if (-not $alcPath) {
          Write-Error "Could not find alc.exe in downloaded artifacts"
          exit 1
        }
        Write-Host "Found AL compiler: $($alcPath.FullName)"

        # Locate system and base app symbols
        $appFiles = Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "bcartifacts") `
          -Filter "*.app" -Recurse
        foreach ($app in $appFiles) {
          Copy-Item -Path $app.FullName -Destination $symbolsPath -Force
        }
        Write-Host "Copied $($appFiles.Count) symbol files to $symbolsPath"

        # Compile the extension
        $outputPath = Join-Path $env:GITHUB_WORKSPACE "output"
        New-Item -ItemType Directory -Path $outputPath -Force | Out-Null

        $alcArgs = @(
          "/project:$env:GITHUB_WORKSPACE"
          "/packagecachepath:$symbolsPath"
          "/out:$outputPath"
          "/assemblyprobingpaths:$((Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP 'bcartifacts') -Directory | Select-Object -First 1).FullName)"
        )

        Write-Host "Compiling AL extension..."
        & $alcPath.FullName $alcArgs
        if ($LASTEXITCODE -ne 0) {
          Write-Error "AL compilation failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }

        $builtApp = Get-ChildItem -Path $outputPath -Filter "*.app" | Select-Object -First 1
        if ($builtApp) {
          Write-Host "Build successful: $($builtApp.Name)"
        } else {
          Write-Error "No .app file produced"
          exit 1
        }

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: GeoAI-OSS-App
        path: output/*.app
        retention-days: 30
        if-no-files-found: warn

  validate:
    runs-on: windows-latest
    name: Validation Checks

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check for secrets in code
      shell: powershell
      run: |
        Write-Host "Scanning for potential secrets..."
        $patterns = @(
          'api[_-]?key\s*[:=]\s*[''"][^''"]{20,}',
          'password\s*[:=]\s*[''"][^''"]+',
          'secret\s*[:=]\s*[''"][^''"]{20,}',
          'token\s*[:=]\s*[''"][^''"]{20,}'
        )

        $found = $false
        foreach ($pattern in $patterns) {
          $hits = Get-ChildItem -Path . -Include *.al,*.json -Recurse |
                  Select-String -Pattern $pattern -CaseSensitive:$false
          if ($hits) {
            Write-Warning "Potential secret found matching pattern: $pattern"
            $hits | ForEach-Object { Write-Warning $_.Line }
            $found = $true
          }
        }

        if ($found) {
          Write-Error "Potential secrets detected. Review matches above."
          exit 1
        } else {
          Write-Host "No obvious secrets detected in source code"
        }

    - name: Verify no compiled artifacts committed
      shell: powershell
      run: |
        Write-Host "Checking for committed .app files..."
        $committedApps = git ls-files "*.app" "*.flf"
        if ($committedApps) {
          Write-Error "Compiled artifacts should not be committed:"
          $committedApps | ForEach-Object { Write-Error "  - $_" }
          exit 1
        } else {
          Write-Host "No compiled artifacts in git"
        }
