name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    name: Build GeoAI OSS
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup AL-Go
      uses: microsoft/AL-Go-Actions/RunPipeline@v6.3
      with:
        shell: powershell
        project: .
        
    - name: Build AL Extension
      run: |
        Write-Host "Building GeoAI OSS extension..."
        # The AL-Go action above handles the actual build
        # This step is a placeholder for additional build verification
      shell: powershell
      
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: GeoAI-OSS-App
        path: '**/*.app'
        retention-days: 30
        if-no-files-found: warn

  validate:
    runs-on: windows-latest
    name: Validation Checks
    needs: build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check for secrets in code
      run: |
        Write-Host "Scanning for potential secrets..."
        $patterns = @(
          'api[_-]?key\s*[:=]\s*[''"][^''"]{20,}',
          'password\s*[:=]\s*[''"][^''"]+',
          'secret\s*[:=]\s*[''"][^''"]{20,}',
          'token\s*[:=]\s*[''"][^''"]{20,}'
        )
        
        $found = $false
        foreach ($pattern in $patterns) {
          $matches = Get-ChildItem -Path . -Include *.al,*.json -Recurse | 
                     Select-String -Pattern $pattern -CaseSensitive:$false
          if ($matches) {
            Write-Warning "Potential secret found matching pattern: $pattern"
            $matches | ForEach-Object { Write-Warning $_.Line }
            $found = $true
          }
        }
        
        if ($found) {
          Write-Error "Potential secrets detected. Review matches above."
          exit 1
        } else {
          Write-Host "✓ No obvious secrets detected in source code"
        }
      shell: powershell
      
    - name: Verify no compiled artifacts committed
      run: |
        Write-Host "Checking for committed .app files..."
        # Check in git (not just filesystem, since .gitignore should prevent)
        $committedApps = git ls-files "*.app" "*.flf"
        if ($committedApps) {
          Write-Error "Compiled artifacts should not be committed:"
          $committedApps | ForEach-Object { Write-Error "  - $_" }
          exit 1
        } else {
          Write-Host "✓ No compiled artifacts in git"
        }
      shell: powershell
