name: Build and Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    name: Build GeoAI OSS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install BcContainerHelper
      shell: powershell
      run: |
        Install-Module BcContainerHelper -Force -AllowClobber
        Import-Module BcContainerHelper
        Write-Host "BcContainerHelper $(Get-Module BcContainerHelper | Select-Object -ExpandProperty Version) installed"

    - name: Compile AL extension
      shell: powershell
      run: |
        Import-Module BcContainerHelper

        $appJson = Get-Content -Path 'app.json' -Raw | ConvertFrom-Json
        $fullVer = [version]$appJson.application
        $majorMinor = "$($fullVer.Major).$($fullVer.Minor)"
        Write-Host "App targets BC application $($appJson.application) - resolving artifacts for $majorMinor"

        $artifactUrl = Get-BCArtifactUrl -type Sandbox -country w1 -version $majorMinor -select Closest
        if (-not $artifactUrl) {
          Write-Error "No BC Sandbox artifact found for version $majorMinor"
          exit 1
        }
        Write-Host "Resolved artifact: $artifactUrl"

        $basePath = Join-Path $env:RUNNER_TEMP 'bcartifacts'
        Download-Artifacts -artifactUrl $artifactUrl -basePath $basePath

        $alc = Get-ChildItem -Path $basePath -Filter 'alc.exe' -Recurse | Select-Object -First 1
        if (-not $alc) {
          Write-Error "alc.exe not found in downloaded artifacts"
          exit 1
        }
        Write-Host "AL Compiler: $($alc.FullName)"

        $symbolsPath = Join-Path $env:GITHUB_WORKSPACE '.alpackages'
        New-Item -ItemType Directory -Path $symbolsPath -Force | Out-Null
        $symbols = Get-ChildItem -Path $basePath -Filter '*.app' -Recurse
        $symbols | ForEach-Object { Copy-Item $_.FullName -Destination $symbolsPath -Force }
        Write-Host "Copied $($symbols.Count) symbol packages"

        $outputPath = Join-Path $env:GITHUB_WORKSPACE 'output'
        New-Item -ItemType Directory -Path $outputPath -Force | Out-Null

        $dotnetAssemblies = Get-ChildItem -Path $basePath -Directory -Recurse |
          Where-Object { Test-Path (Join-Path $_.FullName 'Microsoft.Dynamics.Nav.Server.exe') } |
          Select-Object -First 1
        $probingPath = if ($dotnetAssemblies) { $dotnetAssemblies.FullName } else { $basePath }

        Write-Host "Compiling AL extension..."
        & $alc.FullName /project:"$env:GITHUB_WORKSPACE" /packagecachepath:"$symbolsPath" /out:"$outputPath" /assemblyprobingpaths:"$probingPath"
        if ($LASTEXITCODE -ne 0) {
          Write-Error "AL compilation failed (exit code $LASTEXITCODE)"
          exit $LASTEXITCODE
        }

        $result = Get-ChildItem -Path $outputPath -Filter '*.app' | Select-Object -First 1
        if ($result) {
          Write-Host "Build successful: $($result.Name) ($([math]::Round($result.Length / 1KB)) KB)"
        } else {
          Write-Error "No .app file produced"
          exit 1
        }

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: GeoAI-OSS-App
        path: output/*.app
        retention-days: 30
        if-no-files-found: warn

  validate:
    runs-on: windows-latest
    name: Validation Checks

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check for secrets in code
      shell: powershell
      run: |
        Write-Host "Scanning for potential secrets..."
        $patterns = @(
          'api[_-]?key\s*[:=]\s*[''"][^''"]{20,}',
          'password\s*[:=]\s*[''"][^''"]+',
          'secret\s*[:=]\s*[''"][^''"]{20,}',
          'token\s*[:=]\s*[''"][^''"]{20,}'
        )

        $found = $false
        foreach ($pattern in $patterns) {
          $hits = Get-ChildItem -Path . -Include *.al,*.json -Recurse |
                  Select-String -Pattern $pattern -CaseSensitive:$false
          if ($hits) {
            Write-Warning "Potential secret found matching pattern: $pattern"
            $hits | ForEach-Object { Write-Warning $_.Line }
            $found = $true
          }
        }

        if ($found) {
          Write-Error "Potential secrets detected. Review matches above."
          exit 1
        } else {
          Write-Host "No obvious secrets detected in source code"
        }

    - name: Verify no compiled artifacts committed
      shell: powershell
      run: |
        Write-Host "Checking for committed .app files..."
        $committedApps = git ls-files "*.app" "*.flf"
        if ($committedApps) {
          Write-Error "Compiled artifacts should not be committed:"
          $committedApps | ForEach-Object { Write-Error "  - $_" }
          exit 1
        } else {
          Write-Host "No compiled artifacts in git"
        }
